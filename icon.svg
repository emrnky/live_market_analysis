<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <style>
      .ring   { fill: none; stroke: #c9a84c; }
      .bull   { fill: #c9a84c; }
      .dot    { fill: #c9a84c; }
      @media (prefers-color-scheme: light) {
        .ring { stroke: #9e7c30; }
        .bull { fill: #9e7c30; }
        .dot  { fill: #9e7c30; }
      }
    </style>
  </defs>

  <circle class="ring" cx="32" cy="32" r="29" stroke-width="3"/>
  <circle class="ring" cx="32" cy="32" r="20" stroke-width="3"/>
  <circle class="bull" cx="32" cy="32" r="9" opacity="0.18"/>
  <circle class="ring" cx="32" cy="32" r="9" stroke-width="2.5"/>
  <circle class="dot" cx="32" cy="32" r="3.5"/>
</svg>
